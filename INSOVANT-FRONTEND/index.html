<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INSOVANT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Pre-load main.html while user watches intro = near-instant navigation -->
  <link rel="prefetch" href="main.html" />
  <link rel="stylesheet" href="intro.css" />
</head>

<body>

  <!-- Ambient particle canvas -->
  <canvas id="ambientCanvas"></canvas>

  <!-- WHITE BOOM flash (fills screen on Stage 3) -->
  <div id="boomFlash" class="boom-flash"></div>

  <!-- Skip Intro -->
  <button id="skipBtn" class="skip-btn">Skip Intro</button>

  <!-- ════ SCROLL SPACER: 400vh gives 3 viewports of sticky scroll ════ -->
  <div class="scroll-spacer">
    <section class="cinematic-intro" id="intro">
      <div class="intro-inner">

        <!--
          INSOVANT wordmark.
          The S (.wl-s) is the star — it stays in its natural position.
          Stages 1-3 animate only the S span; others dissolve and exit.
        -->
        <div class="wordmark" id="wordmark">
          <div class="wordmark-inner" id="wordmarkInner">
            <span class="wl wl-i1" data-idx="0">I</span>
            <span class="wl wl-n1" data-idx="1">N</span>
            <span class="wl wl-s" id="letterS" data-idx="2">S</span>
            <span class="wl wl-o" data-idx="3">O</span>
            <span class="wl wl-v" data-idx="4">V</span>
            <span class="wl wl-a" data-idx="5">A</span>
            <span class="wl wl-n2" data-idx="6">N</span>
            <span class="wl wl-t" data-idx="7">T</span>
          </div>
        </div>

        <!-- Scroll indicator -->
        <div class="scroll-hint" id="scrollHint">
          <div class="sh-line">
            <div class="sh-dot"></div>
          </div>
          <span>scroll</span>
        </div>

      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>

</html>
